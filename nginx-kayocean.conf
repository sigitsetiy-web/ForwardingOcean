# HTTP → HTTPS redirect (domain)
server {
    listen 80;
    server_name kayocean.wasilah.digital;
    return 301 https://$host$request_uri;
}

# IP lama → arahkan ke domain HTTPS
server {
    listen 80;
    server_name 76.13.194.156;
    return 301 https://kayocean.wasilah.digital$request_uri;
}

# HTTPS — KayOcean FMS
server {
    listen 443 ssl;
    server_name kayocean.wasilah.digital;

    ssl_certificate /etc/letsencrypt/live/kayocean.wasilah.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kayocean.wasilah.digital/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
